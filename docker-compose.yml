  #   # plus the KAFKA_BROKERS lines under api/worker to run the Reliable
  #   # Messaging Pair: the outbox publishes here and the inbox consumers
  #   # subscribe. `redpanda:9092` is the in-network listener the app connects to.
  #   image: redpandadata/redpanda:v24.2.7
