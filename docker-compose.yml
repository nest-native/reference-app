# Local stack for nest-native/reference-app. Three flavors:
#
#   SQLite (default):       docker compose up
#                           Single host, persistent volume, no extra service.
#                           Messaging stays in-process (outbox dispatches to
#                           registered handlers); no Kafka.
#
#   Postgres (recipe):      uncomment the `postgres` service and the
#                           DATABASE_URL line under `api:`/`worker:`. The app
#                           currently uses better-sqlite3 in `src/database/`,
#                           so wiring Postgres also requires swapping
#                           `drizzle-orm/better-sqlite3` for `drizzle-orm/pg`
#                           (see docs/architecture.md).
#
#   Kafka (recipe):         uncomment the `redpanda` service and the
#                           KAFKA_BROKERS line under `api:`/`worker:`. Setting
#                           KAFKA_BROKERS is the single opt-in switch: the outbox
#                           claimer then publishes to Kafka and the inbox
#                           consumers subscribe (the Reliable Messaging Pair).
#                           Redpanda is a single-binary, Kafka-API-compatible
#                           broker — no ZooKeeper. With it commented out the
#                           default stack stays SQLite + in-process.
#
# Stack:
#   - api      → exposes :3000, runs migrations on start
#   - worker   → long-running outbox poller, no port exposed
#   - (postgres → optional)
#   - (redpanda → optional, Kafka API)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: reference-app:latest
    ports:
      - "3000:3000"
    volumes:
      - reference-app-data:/data
    environment:
      DATABASE_URL: /data/app.db
      # DATABASE_URL: postgres://app:app@postgres:5432/app
      # KAFKA_BROKERS: redpanda:9092          # opt-in: turns on the Kafka profile
      # KAFKA_TOPIC_PREFIX: ""
      # KAFKA_GROUP_ID: reference-app
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET (min 32 chars) in .env or shell}
      AUTH_TTL_SECONDS: "3600"
      PORT: "3000"
      NODE_ENV: production
    # Run migrations on container start, then boot the API.
    command: >
      sh -c "node -e \"require('./scripts/migrate.ts')\" 2>/dev/null
             || npx tsx ./scripts/migrate.ts;
             exec node dist/main.js"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  worker:
    image: reference-app:latest
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - reference-app-data:/data
    environment:
      DATABASE_URL: /data/app.db
      # DATABASE_URL: postgres://app:app@postgres:5432/app
      # KAFKA_BROKERS: redpanda:9092          # opt-in: claimer publishes to Kafka
      # KAFKA_TOPIC_PREFIX: ""
      # KAFKA_GROUP_ID: reference-app
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET (min 32 chars) in .env or shell}
      OUTBOX_POLL_MS: "2000"
      OUTBOX_BATCH_SIZE: "32"
      OUTBOX_STUCK_TIMEOUT_MS: "60000"
      NODE_ENV: production
    command: ["node", "dist/scripts/start-worker.js"]
    stop_grace_period: 15s

  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: app
  #     POSTGRES_PASSWORD: app
  #     POSTGRES_DB: app
  #   volumes:
