<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}nest-native reference app</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    >
    <meta name="theme-color" content="#101820">
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header" aria-label="Primary">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Nest Native reference app">
        <span class="brand-mark" aria-hidden="true">N</span>
        <span>Nest Native / reference-app</span>
      </a>
      <nav class="nav-links" aria-label="Sections">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/architecture.html' | relative_url }}">Architecture</a>
        <a href="https://github.com/nest-native/reference-app">GitHub</a>
      </nav>
    </header>

    <main>
      <article class="prose">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <span>nest-native / reference-app</span>
      <a href="https://github.com/nest-native/reference-app">github.com/nest-native/reference-app</a>
    </footer>
  </body>
</html>
